
name: 'transforms'
version: '1.0.0'
profile: 'transforms'
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
# seed-paths: ["seeds"]
macro-paths: ["macros"]
# snapshot-paths: ["snapshots"]

# Redirect build artifacts to container-local /tmp to avoid Docker/host
# permission conflicts when running inside a containerized Airflow environment.
# target/ and logs/ are ephemeral and must never be written to the bind mount.
target-path: "/tmp/dbt_target"
log-path: "/tmp/dbt_logs"

# directories to be removed by `dbt clean`
clean-targets:
  - "target"
  - "dbt_packages"

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  transforms:
    # Config indicated by + and applies to all files under models/example/
    staging:
      +materialized: view
      +schema: staging
      +dbt-osmosis: "schema.yml"
    intermediate:
      +materialized: view
      +schema: intermediate
      +dbt-osmosis: "schema.yml"
    marts:
      +materialized: table
      +schema: marts
      +dbt-osmosis: "schema.yml"