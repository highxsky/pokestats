version: 2
models:
  - name: int_past_types
    columns:
      - name: past_type_id
        data_type: VARCHAR
        description: Surrogate key for a pokemon's past type
        tests:
          - unique
          - not_null
      - name: fetch_date
        data_type: TIMESTAMP
        description: Datetime when a pokemon was fetched
        tests:
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: A pokemon's identifier
        tests:
          - not_null
      - name: poke_gen
        data_type: INTEGER
        description: Generation of a pokemon
        tests:
          - not_null
      - name: slot
        data_type: INTEGER
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2]
      - name: type
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [normal, fire, water, electric, grass, ice, fighting, poison, ground, flying,
                  psychic, bug, rock, ghost, dragon, dark, steel, fairy]
sources: []
seeds: []
