version: 2
models:
  - name: int_stats
    columns:
      - name: fetch_date
        data_type: TIMESTAMP
        description: '{{ doc("fetch_date") }}'
        tests:
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: '{{ doc("poke_id") }}'
        tests:
          - unique
          - not_null
      - name: hp
        data_type: INTEGER
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("hp") }}'
      - name: attack
        data_type: INTEGER
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("attack") }}'
      - name: defense
        data_type: INTEGER
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("defense") }}'
      - name: special_attack
        data_type: INTEGER
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("special_attack") }}'
      - name: special_defense
        data_type: INTEGER
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("special_defense") }}'
      - name: speed
        data_type: INTEGER
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("speed") }}'
sources: []
seeds: []
