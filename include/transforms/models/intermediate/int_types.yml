version: 2
models:
  - name: int_types
    columns:
      - name: type_id
        data_type: VARCHAR
        description: '{{ doc("type_id") }}'
        tests:
          - unique
          - not_null
      - name: fetch_date
        data_type: TIMESTAMP
        description: '{{ doc("fetch_date") }}'
        tests:
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: '{{ doc("poke_id") }}'
        tests:
          - not_null
      - name: slot
        data_type: INTEGER
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2]
        description: '{{ doc("slot") }}'
      - name: type
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [normal, fire, water, electric, grass, ice, fighting, poison, ground, flying, psychic, bug, rock, ghost, dragon, dark, steel, fairy]
        description: '{{ doc("type") }}'
sources: []
seeds: []
