version: 2
models:
  - name: mart_moves
    description: One row per move with its core attributes
    columns:
      - name: move_id
        data_type: INTEGER
        description: '{{ doc("move_id") }}'
        tests:
          - unique
          - not_null
      - name: move_name
        data_type: VARCHAR
        description: '{{ doc("move_name") }}'
        tests:
          - not_null
      - name: power
        data_type: INTEGER
        description: Base power (NULL for status moves)
      - name: accuracy
        data_type: INTEGER
        description: Accuracy percentage (NULL for moves that can't miss)
      - name: pp
        data_type: INTEGER
        description: '{{ doc("pp") }}'
        tests:
          - not_null
      - name: priority
        data_type: INTEGER
        description: Move priority bracket
        tests:
          - not_null
      - name: type
        data_type: VARCHAR
        description: '{{ doc("type") }}'
        tests:
          - not_null
      - name: damage_class
        data_type: VARCHAR
        description: Physical, special, or status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [physical, special, status]
      - name: poke_gen
        data_type: INTEGER
        description: '{{ doc("poke_gen") }}'
        tests:
          - not_null
sources: []
seeds: []
