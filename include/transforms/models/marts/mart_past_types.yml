version: 2
models:
  - name: mart_past_types
    description: Full type history per pokemon per slot, with generation-based validity windows
    columns:
      - name: type_id
        data_type: VARCHAR
        description: '{{ doc("type_id") }}'
        tests:
          - unique
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: '{{ doc("poke_id") }}'
      - name: slot
        data_type: INTEGER
        description: '{{ doc("slot") }}'
      - name: type
        data_type: VARCHAR
        description: '{{ doc("type") }}'
      - name: valid_from_gen
        data_type: INTEGER
        description: The generation this type assignment became active
      - name: valid_to_gen
        data_type: INTEGER
        description: The last generation this type assignment was active (NULL = still current)
sources: []
seeds: []
