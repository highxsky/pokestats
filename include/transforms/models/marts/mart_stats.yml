version: 2
models:
  - name: mart_stats
    columns:
      - name: poke_id
        data_type: INTEGER
        description: '{{ doc("poke_id") }}'
        tests:
          - unique
          - not_null
      - name: hp
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("hp") }}'
      - name: attack
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("attack") }}'
      - name: defense
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("defense") }}'
      - name: special_attack
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("special_attack") }}'
      - name: special_defense
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("special_defense") }}'
      - name: speed
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
        description: '{{ doc("speed") }}'
      - name: total_stat_points
        data_type: INTEGER
        tests:
          - min_value:
              arguments:
                min_val: 0
sources: []
seeds: []
