version: 2
models:
  - name: mart_strongest_pokemons
    description: >-
      All pokemons ranked from strongest to weakest by total stat points, with a tier label (S to F)
    columns:
      - name: poke_gen
        data_type: SMALLINT
        description: '{{ doc("poke_gen") }}'
      - name: poke_id
        data_type: INTEGER
        description: '{{ doc("poke_id") }}'
        tests:
          - unique
          - not_null
      - name: poke_name
        data_type: VARCHAR
        description: '{{ doc("poke_name") }}'
        tests:
          - not_null
      - name: hp
        data_type: INTEGER
        description: '{{ doc("hp") }}'
      - name: attack
        data_type: INTEGER
        description: '{{ doc("attack") }}'
      - name: defense
        data_type: INTEGER
        description: '{{ doc("defense") }}'
      - name: special_attack
        data_type: INTEGER
        description: '{{ doc("special_attack") }}'
      - name: special_defense
        data_type: INTEGER
        description: '{{ doc("special_defense") }}'
      - name: speed
        data_type: INTEGER
        description: '{{ doc("speed") }}'
      - name: total_stat_points
        data_type: INTEGER
        description: Sum of all six stats
        tests:
          - min_value:
              arguments:
                min_val: 0
      - name: rank
        data_type: INTEGER
        description: Pokemon's overall rank from strongest (1) to weakest
        tests:
          - not_null
      - name: tier
        data_type: VARCHAR
        description: >-
          Strength tier based on percentile rank: S (top 5%), A (5-20%), B (20-45%), C (45-70%), D (70-90%),
          F (bottom 10%)
        tests:
          - accepted_values:
              arguments:
                values: [S, A, B, C, D, F]
sources: []
seeds: []
