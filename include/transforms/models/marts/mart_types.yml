version: 2
models:
  - name: mart_types
    description: Current type assignment per pokemon per slot
    columns:
      - name: type_id
        data_type: VARCHAR
        description: '{{ doc("type_id") }}'
        tests:
          - unique
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: '{{ doc("poke_id") }}'
      - name: slot
        data_type: INTEGER
        description: '{{ doc("slot") }}'
      - name: type
        data_type: VARCHAR
        description: '{{ doc("type") }}'
sources: []
seeds: []
