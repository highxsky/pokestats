version: 2
models:
  - name: mart_pokemons
    columns:
      - name: poke_gen
        data_type: SMALLINT
        description: A pokemon's generation
        tests:
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: A pokemon's identifier
        tests:
          - unique
          - not_null
      - name: poke_name
        data_type: VARCHAR
        description: A pokemon's name
        tests:
          - not_null
      - name: height
        data_type: DOUBLE
        description: A pokemon's height (in meters)
        tests:
          - min_value:
              arguments:
                min_val: 0
      - name: weight
        data_type: DOUBLE
        description: A pokemon's weight (in kilograms)
        tests:
          - min_value:
              arguments:
                min_val: 0
  - name: mart_stats
    columns:
      - name: poke_id
        data_type: INTEGER
        description: A pokemon's identifier
        tests:
          - unique
          - not_null
      - name: hp
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
      - name: attack
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
      - name: defense
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
      - name: special_attack
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
      - name: special_defense
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
      - name: speed
        data_type: INTEGER
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 255
      - name: total_stat_points
        data_type: INTEGER
        tests:
          - min_value:
              arguments:
                min_val: 0
  - name: mart_strongest_pokemons
    description: All pokemons ranked from strongest to weakest by total stat points, with a tier label (S to F)
    columns:
      - name: poke_gen
        data_type: SMALLINT
        description: A pokemon's generation
      - name: poke_id
        data_type: INTEGER
        description: A pokemon's identifier
        tests:
          - unique
          - not_null
      - name: poke_name
        data_type: VARCHAR
        description: A pokemon's name
        tests:
          - not_null
      - name: hp
        data_type: INTEGER
        description: A pokemon's HP stat
      - name: attack
        data_type: INTEGER
        description: A pokemon's attack stat
      - name: defense
        data_type: INTEGER
        description: A pokemon's defense stat
      - name: special_attack
        data_type: INTEGER
        description: A pokemon's special attack stat
      - name: special_defense
        data_type: INTEGER
        description: A pokemon's special defense stat
      - name: speed
        data_type: INTEGER
        description: A pokemon's speed stat
      - name: total_stat_points
        data_type: INTEGER
        description: Sum of all six stats
        tests:
          - min_value:
              arguments:
                min_val: 0
      - name: rank
        data_type: INTEGER
        description: Pokemon's overall rank from strongest (1) to weakest
        tests:
          - not_null
      - name: tier
        data_type: VARCHAR
        description: "Strength tier based on percentile rank: S (top 5%), A (5-20%), B (20-45%), C (45-70%), D (70-90%), F (bottom 10%)"
        tests:
          - accepted_values:
              values: ['S', 'A', 'B', 'C', 'D', 'F']
  - name: mart_generations
    description: One row per Pokemon generation with its English display name
    columns:
      - name: poke_gen
        data_type: INTEGER
        description: The generation identifier
        tests:
          - unique
          - not_null
      - name: gen_name
        data_type: VARCHAR
        description: The generation's English display name (e.g. Generation I)
        tests:
          - not_null
  - name: mart_version_groups
    description: One row per version group with its generation
    columns:
      - name: version_group_id
        data_type: INTEGER
        description: The version group identifier
        tests:
          - unique
          - not_null
      - name: version_group_name
        data_type: VARCHAR
        description: The version group name (e.g. red-blue)
        tests:
          - not_null
      - name: poke_gen
        data_type: INTEGER
        description: The generation this version group belongs to
        tests:
          - not_null
  - name: mart_version_group_versions
    description: Mapping of individual game versions to their version groups
    columns:
      - name: version_id
        data_type: INTEGER
        description: The version identifier
        tests:
          - unique
          - not_null
      - name: version_name
        data_type: VARCHAR
        description: The version name (e.g. red)
        tests:
          - not_null
      - name: version_group_id
        data_type: INTEGER
        description: Foreign key to mart_version_groups
        tests:
          - not_null
          - relationships:
              to: ref('mart_version_groups')
              field: version_group_id
  - name: mart_pokemon_moves
    description: One row per pokemon x move
    columns:
      - name: pokemon_move_id
        data_type: VARCHAR
        description: Surrogate key (poke_id, move_id)
        tests:
          - unique
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: A pokemon's identifier
      - name: move_id
        data_type: INTEGER
        description: The move identifier
  - name: mart_moves
    description: One row per move with its core attributes
    columns:
      - name: move_id
        data_type: INTEGER
        description: The move identifier
        tests:
          - unique
          - not_null
      - name: move_name
        data_type: VARCHAR
        description: The move name
        tests:
          - not_null
      - name: power
        data_type: INTEGER
        description: Base power (NULL for status moves)
      - name: accuracy
        data_type: INTEGER
        description: Accuracy percentage (NULL for moves that can't miss)
      - name: pp
        data_type: INTEGER
        description: Power points
        tests:
          - not_null
      - name: priority
        data_type: INTEGER
        description: Move priority bracket
        tests:
          - not_null
      - name: type
        data_type: VARCHAR
        description: Elemental type
        tests:
          - not_null
      - name: damage_class
        data_type: VARCHAR
        description: Physical, special, or status
        tests:
          - not_null
          - accepted_values:
              values: ['physical', 'special', 'status']
      - name: poke_gen
        data_type: INTEGER
        description: Generation this move was introduced in
        tests:
          - not_null
  - name: mart_types
    description: Current type assignment per pokemon per slot
    columns:
      - name: type_id
        data_type: VARCHAR
        description: Surrogate key (hash of poke_id, slot)
        tests:
          - unique
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: A pokemon's identifier
      - name: slot
        data_type: INTEGER
        description: Type slot (1 = primary, 2 = secondary)
      - name: type
        data_type: VARCHAR
        description: The type name
  - name: mart_past_types
    description: Full type history per pokemon per slot, with generation-based validity windows
    columns:
      - name: type_id
        data_type: VARCHAR
        description: Surrogate key (hash of poke_id, slot, valid_from_gen)
        tests:
          - unique
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: A pokemon's identifier
      - name: slot
        data_type: INTEGER
        description: Type slot (1 = primary, 2 = secondary)
      - name: type
        data_type: VARCHAR
        description: The type name
      - name: valid_from_gen
        data_type: INTEGER
        description: The generation this type assignment became active
      - name: valid_to_gen
        data_type: INTEGER
        description: The last generation this type assignment was active (NULL = still current)
