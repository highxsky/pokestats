version: 2
models:
  - name: stg_move_details
    columns:
      - name: fetch_date
        description: '{{ doc("fetch_date") }}'
        data_type: TIMESTAMP
        tests:
          - not_null
      - name: move_id
        description: '{{ doc("move_id") }}'
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: move_name
        description: '{{ doc("move_name") }}'
        data_type: VARCHAR
        tests:
          - not_null
      - name: power
        description: The move's base power (NULL for status moves)
        data_type: INTEGER
      - name: accuracy
        description: The move's accuracy percentage (NULL for moves that can't miss)
        data_type: INTEGER
      - name: pp
        description: '{{ doc("pp") }}'
        data_type: INTEGER
        tests:
          - not_null
      - name: priority
        description: Move priority bracket (-8 to +8, 0 is normal)
        data_type: INTEGER
        tests:
          - not_null
      - name: type
        description: '{{ doc("type") }}'
        data_type: VARCHAR
        tests:
          - not_null
      - name: damage_class
        description: Physical, special, or status
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [physical, special, status]
      - name: poke_gen
        description: '{{ doc("poke_gen") }}'
        data_type: INTEGER
        tests:
          - not_null
sources: []
seeds: []
