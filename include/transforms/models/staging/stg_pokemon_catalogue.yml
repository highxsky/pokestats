version: 2
models:
  - name: stg_pokemon_catalogue
    columns:
      - name: fetch_date
        data_type: TIMESTAMP
        description: '{{ doc("fetch_date") }}'
        tests:
          - not_null
      - name: poke_gen
        data_type: INTEGER
        description: '{{ doc("poke_gen") }}'
        tests:
          - not_null
      - name: poke_name
        data_type: VARCHAR
        description: '{{ doc("poke_name") }}'
        tests:
          - not_null
      - name: poke_id
        data_type: INTEGER
        description: '{{ doc("poke_id") }}'
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - poke_id
              - fetch_date
sources: []
seeds: []
